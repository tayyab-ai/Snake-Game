<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Snake Game - Level Infinity | Developed by Tayyab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <!-- Stars Background -->
        <div class="stars" id="stars"></div>
        
        <!-- Game Container -->
        <div class="game-container">
            <!-- Header -->
            <header class="game-header">
                <div class="header-left">
                    <div class="logo">
                        <svg class="snake-logo" viewBox="0 0 40 40">
                            <circle cx="20" cy="20" r="18" fill="none" stroke="#00ff88" stroke-width="2"/>
                            <path d="M10 20 Q20 5 30 20 Q20 35 10 20" fill="#00ff88" opacity="0.6"/>
                            <circle cx="12" cy="18" r="2" fill="#fff"/>
                            <circle cx="12" cy="22" r="2" fill="#fff"/>
                        </svg>
                        <span>SNAKE</span>
                    </div>
                </div>
                
                <div class="header-center">
                    <div class="score-display">
                        <div class="score-item">
                            <span class="score-label">SCORE</span>
                            <span class="score-value" id="score">0</span>
                        </div>
                        <div class="score-divider"></div>
                        <div class="score-item">
                            <span class="score-label">LEVEL</span>
                            <span class="score-value level-value" id="level">1</span>
                        </div>
                        <div class="score-divider"></div>
                        <div class="score-item">
                            <span class="score-label">BEST</span>
                            <span class="score-value best-value" id="bestScore">0</span>
                        </div>
                    </div>
                </div>
                
                <div class="header-right">
                    <button class="btn-icon" id="soundToggle" title="Sound">
                        <svg class="icon-sound" viewBox="0 0 24 24">
                            <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/>
                            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor" id="soundWave1"/>
                            <path d="M19 12c0-3.18-1.86-5.93-4.5-7.2v14.4c2.64-1.27 4.5-4.02 4.5-7.2z" fill="currentColor" id="soundWave2"/>
                        </svg>
                    </button>
                    <button class="btn-icon" id="pauseToggle" title="Pause">
                        <svg viewBox="0 0 24 24" id="pauseIcon">
                            <rect x="6" y="4" width="4" height="16" fill="currentColor"/>
                            <rect x="14" y="4" width="4" height="16" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Canvas Area -->
            <div class="canvas-container">
                <canvas id="gameCanvas"></canvas>
                
                <!-- Overlay Screens -->
                <div class="overlay" id="startScreen">
                    <div class="overlay-content">
                        <div class="game-title-animated">
                            <h1 class="title-text">
                                <span>S</span><span>N</span><span>A</span><span>K</span><span>E</span>
                            </h1>
                            <p class="subtitle">INFINITY LEVELS</p>
                        </div>
                        <div class="controls-info">
                            <div class="control-item">
                                <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
                                <span>Arrow Keys</span>
                            </div>
                            <div class="control-item">
                                <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
                                <span>WASD</span>
                            </div>
                            <div class="control-item">
                                <kbd>SPACE</kbd>
                                <span>Pause</span>
                            </div>
                        </div>
                        <button class="btn-start" id="btnStart">
                            <span>START GAME</span>
                            <svg class="btn-arrow" viewBox="0 0 24 24">
                                <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <p class="hint-text">Eat food to level up. Don't hit yourself!</p>
                    </div>
                </div>

                <div class="overlay hidden" id="pauseScreen">
                    <div class="overlay-content">
                        <h2>PAUSED</h2>
                        <p>Press <kbd>SPACE</kbd> or <kbd>P</kbd> to resume</p>
                        <button class="btn-start btn-resume" id="btnResume">
                            <span>RESUME</span>
                        </button>
                    </div>
                </div>

                <div class="overlay hidden" id="gameOverScreen">
                    <div class="overlay-content">
                        <h2 class="gameover-title">GAME OVER</h2>
                        <div class="final-stats">
                            <div class="stat-row">
                                <span>Final Score</span>
                                <span class="stat-value" id="finalScore">0</span>
                            </div>
                            <div class="stat-row">
                                <span>Level Reached</span>
                                <span class="stat-value" id="finalLevel">1</span>
                            </div>
                            <div class="stat-row">
                                <span>Food Eaten</span>
                                <span class="stat-value" id="finalFood">0</span>
                            </div>
                            <div class="stat-row highlight">
                                <span>Time Survived</span>
                                <span class="stat-value" id="finalTime">0s</span>
                            </div>
                        </div>
                        <div class="gameover-buttons">
                            <button class="btn-start" id="btnRestart">
                                <span>PLAY AGAIN</span>
                            </button>
                            <button class="btn-start btn-secondary" id="btnMenu">
                                <span>MAIN MENU</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Level Up Notification -->
                <div class="level-up-notification hidden" id="levelUpNotif">
                    <div class="level-up-content">
                        <span class="level-up-icon">⬆</span>
                        <span class="level-up-text">LEVEL <span id="levelUpNumber">2</span></span>
                        <span class="level-up-speed" id="levelUpSpeed">Speed +5%</span>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="game-footer">
                <div class="food-eaten-display">
                    <span class="food-icon">🍎</span>
                    <span id="foodCount">0</span>
                </div>
                <div class="developer-credit">
                    Developed by <strong>Tayyab</strong>
                </div>
                <div class="speed-display">
                    <span>Speed: </span>
                    <span id="speedDisplay">1.0x</span>
                </div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
